# reusable-build.yml
#
# Workflow for building a SlackBuild package on the Slackware forge.
# Store this file in:
#
#   slackware/ci-tools/.forgejo/workflows/reusable-build.yml
#
# Triggered manually from the Forgejo UI (Actions → Run workflow).

on:
  workflow_dispatch:
    inputs:

      package_name:
        description: >
          Base name of the package being built. Must match the .SlackBuild
          filename and the directory passed to slk_build.
        required: true
        type: string
        default: "scmd"

      version:
        description: >
          Package version string. Used for the version check after a
          successful build and as a label in the uploaded artifact name.
        required: true
        type: string
        default: "8.0.0"

      build_deps:
        description: >
          Space-separated list of additional Slackware packages to install
          before building. The builder image already contains the compiler
          toolchain and common build tools; only list package-specific
          dependencies here.
        required: false
        type: string
        default: "jq gcc-gfortran linuxdoc-tools linuxdoc vala libglvnd mesa opengl-driver libXext libX11 fontconfig libxcb libXau libXdmcp dbus"

      slackbuild_dir:
        description: >
          Path to the directory containing the .SlackBuild script,
          relative to the repository root.
        required: false
        type: string
        default: "."

      upload_artifact:
        description: >
          Whether to upload the built .txz package as a workflow artifact.
        required: false
        type: boolean
        default: true

jobs:
  build:
    runs-on: slackware

    container:
      image: ghcr.io/rizitis/sb-dev-builder:current-v4
#registry.slackware.nl/slackware/slackware-builder:current

    outputs:
      package_file: ${{ steps.build.outputs.package_file }}

    steps:
##      - name: Install runner dep libuv AND all l set (not gentoo here :)
##        run: |
##          slackpkg -batch=on -default_answer=y install libuv
##          slackpkg -batch=on -default_answer=y -checkmd5=off install l
#          No checkmd5 needed , every day 1-3 packages give wrong md5 and break
#          echo "PYTHONPATH=/usr/lib/python3.12/site-packages" >> $GITHUB_ENV
#          echo "PYTHONPATH=/usr/lib/python3.12/site-packages" >> $FORGEJO_ENV
#          NOT WORKING^^ HAD TO EXPORT IN slk_sbo-pkg.sh :(

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Fetch CI helper
        run: |
          curl -sf \
            https://forge.slackware.nl/slackware/ci-tools/raw/branch/main/slk-ci.sh \
            -o slk-ci.sh
          chmod +x slk-ci.sh

      - name: Install build dependencies
        if: inputs.build_deps != ''
        run: |
          source slk-ci.sh
          slk_install_deps ${{ inputs.build_deps }}

#      - name: Upgrade Go
#        run: |
#          set -a
#          source slk-ci.sh
#          bash slk_upgrade_go.sh
#          echo "/usr/lib64/go1.26.3/go/bin" >> $GITHUB_PATH
#          echo "/usr/lib64/go1.26.3/go/bin" >> $FORGEJO_PATH
#          env | grep -i path
#          ls /var/run/act/
#          export in slk_sbo-pkg.sh solved all issues.

      - name: Calculate SBo build dependencies
        run: |
          set -a
          source slk-ci.sh
          BUILDDIR="${GITHUB_WORKSPACE}" bash slk_sbo-ci.sh

      - name: Debug image
        run: |
          cat /etc/slackware-version
          cat /etc/os-release
          uname -a

      - name: Debug dbus
        run: |
          ls -la /usr/lib64/libdbus-1.so*
#       for some reason dbus eather need reinstall or libdbus-1.so is not linked properly in image

#      - name: Debug GL
#        run: |
#          find /usr -name "libGLX*"
#          find /usr -name "libOpenGL*"
#          ls /usr/lib64/libGL*

#      - name: Debug Python
#        run: |
#          python3 -c "import site; print(site.getsitepackages())"
#          python3 -c "from hatchling.__about__ import __version__; print(__version__)"
#          python3 -c "import trove_classifiers; print('trove_classifiers OK')"

      - name: Install SBo dependencies
        run: |
          set -a
          source slk-ci.sh
          BUILDDIR="${GITHUB_WORKSPACE}" bash slk_sbo-pkg.sh

      - name: Build package
        id: build
        run: |
          source slk-ci.sh
          slk_build "${{ inputs.slackbuild_dir }}"
          PKG=$(find "${SLK_PKGDIR}" -name "${{ inputs.package_name }}-*.t?z" \
                  | sort -V | tail -1)
          echo "package_file=$(basename "${PKG}")" >> "${GITHUB_OUTPUT}"
          echo "package_path=${PKG}"               >> "${GITHUB_OUTPUT}"

      - name: Verify installed version
        run: |
          source slk-ci.sh
          slk_install "${{ inputs.package_name }}"
          slk_check_version "${{ inputs.package_name }}" "${{ inputs.version }}"

      - name: Captain Slack is here
        run: |
          cat cptn.nfo
          cat distro.nfo

      - name: Upload package artifact
        if: inputs.upload_artifact
        uses: actions/upload-artifact@v3
        with:
          name: "${{ inputs.package_name }}-${{ inputs.version }}-${{ github.sha }}-slackware-current-x86_64"
          path: ${{ steps.build.outputs.package_path }}
          if-no-files-found: error
          retention-days: 10
# actions/upload-artifact@v4 fails for me, switch to 3 for now
